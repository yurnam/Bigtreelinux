# Build configuration for BigTreeTech PandaTouch
#
# Hardware:
#   - ESP32-S3 (Xtensa LX7 @ 240 MHz, dual-core)
#   - 8 MB Octal PSRAM (OPI mode)
#   - 8 MB QIO Flash
#   - 800x480 RGB565 parallel LCD (DE mode, PCLK = 14.8 MHz)
#   - Goodix GT911 capacitive touch (I2C0)
#   - USB-A OTG host port (GPIO19/20)
#
# Usage:
#   ./build.sh                           (from repo root, recommended)
#   ./rebuild-esp32s3-pandatouch.sh      (from esp32s3-linux/, in Docker)

BUILDROOT_CONFIG=esp32s3_pandatouch
