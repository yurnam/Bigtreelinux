# Build configuration for BigTreeTech PandaTouch
#
# Hardware:
#   - ESP32-S3 (Xtensa LX7 @ 240 MHz, dual-core)
#   - 8 MB Octal PSRAM
#   - 8 MB QIO Flash
#   - 800x480 RGB565 parallel LCD
#   - Goodix GT911 capacitive touch (I2C0)
#   - USB-A OTG host port
#
# Usage:
#   ./rebuild-esp32s3-pandatouch.sh
# or with the generic wifi script:
#   ./rebuild-esp32s3-linux-wifi.sh -c ../pandatouch.conf

BUILDROOT_CONFIG=esp32s3_pandatouch
ESP_HOSTED_CONFIG=sdkconfig.defaults.esp32s3.8n8r
